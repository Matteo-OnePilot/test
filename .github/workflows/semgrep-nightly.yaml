name: Semgrep — Nightly Full Scan

on:
  schedule:
    - cron: "0 2 * * *" # tous les jours a 02h00 UTC
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: semgrep-nightly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  semgrep-full:
    name: Scan complet
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep (repo entier)
        id: semgrep
        continue-on-error: true
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/secrets \
            --config p/python \
            --config p/django \
            --config p/github-actions \
            --sarif --output semgrep-results.sarif \
            --metrics=off \
            --error

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-results.sarif

      - name: Upload Semgrep report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-nightly-results
          path: semgrep-results.sarif
          retention-days: 30

      - name: Fail the build if Semgrep found issues
        if: steps.semgrep.outcome == 'failure'
        run: |
          echo "::error::Semgrep a detecte des vulnerabilites. Voir l'onglet Security > Code scanning alerts pour le detail."
          exit 1
