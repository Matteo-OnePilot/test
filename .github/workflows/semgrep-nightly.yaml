name: Semgrep Nightly Full Scan

# Full repo scan on a schedule, uploads SARIF to GitHub Code Scanning.

on:
  schedule:
    - cron: "0 2 * * *"
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: semgrep-nightly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  semgrep-full:
    name: Full scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep
        id: semgrep
        continue-on-error: true
        run: |
          semgrep scan \
            --config auto \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/secrets \
            --config p/github-actions \
            --sarif --output semgrep-results.sarif \
            --metrics=off \
            --error

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-results.sarif

      - name: Upload Semgrep report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-nightly-results
          path: semgrep-results.sarif
          retention-days: 10

      - name: Fail the build if Semgrep found issues
        if: steps.semgrep.outcome == 'failure'
        run: |
          echo "::error::Semgrep found issues. See Security > Code scanning alerts."
          exit 1
