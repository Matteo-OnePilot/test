name: Semgrep CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  semgrep-scan:
    name: Scan Semgrep (Non-bloquant)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installation de Semgrep CLI
        run: python -m pip install semgrep

      - name: Lancement du scan Semgrep
        run: |
          semgrep scan \
            --config="p/default" \
            --config="p/security-audit" \
            --config="p/secrets" \
            --sarif --output=semgrep.sarif || true

      - name: Publication des résultats (Onglet GitHub Security)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Sauvegarde des résultats (Artefact téléchargeable)
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep.sarif
