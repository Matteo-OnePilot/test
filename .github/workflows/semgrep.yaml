name: Semgrep CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  semgrep-scan:
    name: Scan Semgrep
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installation de Semgrep CLI
        run: python -m pip install semgrep

      - name: Lancement du scan Semgrep
        continue-on-error: true
        run: |
          semgrep scan \
            --config="p/default" \
            --config="p/security-audit" \
            --config="p/secrets" \
            -v
